<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Portal de Frequências Sonoras</title>
    <meta name="description" content="Portal premium de frequências de cura e meditação" />
    <meta name="theme-color" content="#C5A059" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Frequências" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Heartbeat "online agora" — pinga a cada 60s (pro painel do Codice contar)
      (function(){
        try{
          var v=localStorage.getItem('hb_id');
          if(!v){v=Date.now().toString(36)+Math.random().toString(36).slice(2,8);localStorage.setItem('hb_id',v);}
          function ping(){ fetch("https://codice-app-production.up.railway.app/api/webhook/track?page=app-frequencia&v="+v,{mode:'no-cors',keepalive:true}).catch(function(){}); }
          ping();
          setInterval(ping, 60000);
        }catch(e){}
      })();
    </script>
  </body>

</html>
